version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: automacao_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: automacao_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: automacao_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: