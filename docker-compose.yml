version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: automacao_postgres
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: automacao_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
