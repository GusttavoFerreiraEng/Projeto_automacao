services:
  postgres:
    image: postgres:15
    container_name: automacao_postgres
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-dino_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-dino_pass}
      - POSTGRES_DB=${POSTGRES_DB:-dino_db}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: automacao_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"

  api:
    build: .
    container_name: dino_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
    ports: 
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-dino_user}:${POSTGRES_PASSWORD:-dino_pass}@postgres:5432/${POSTGRES_DB:-dino_db}
      - REDIS_URL=redis://redis:6379/0
      - API_KEY_DINO=${API_KEY_DINO:-dinopanquecas}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PYTHONPATH=/app
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    container_name: dino_worker
    command: celery -A app.celery_worker.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
      - ./backend/shopee_session:/app/shopee_session
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-dino_user}:${POSTGRES_PASSWORD:-dino_pass}@postgres:5432/${POSTGRES_DB:-dino_db}
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - redis
      - postgres

  beat:
    build: .
    container_name: dino_beat
    command: celery -A app.celery_worker.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-dino_user}:${POSTGRES_PASSWORD:-dino_pass}@postgres:5432/${POSTGRES_DB:-dino_db}
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - redis

volumes:
  postgres_data: